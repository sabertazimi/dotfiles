#!/usr/bin/env bash

# Idempotent television config.toml modifier
# Usage: cat ~/.config/television/config.toml | ./modify_config.toml > ~/.config/television/config.toml.new

content=$(cat)

# Replace or add orientation = "portrait" under [ui]
if echo "$content" | grep -q '^orientation[[:space:]]*='; then
  # Replace existing orientation line
  content=$(echo "$content" | sed 's/^orientation[[:space:]]*=.*/orientation = "portrait"/')
elif echo "$content" | grep -q '^\[ui\]'; then
  # Add after [ui] header
  content=$(echo "$content" | awk '/^\[ui\]/ { print; print "orientation = \"portrait\""; next } { print }')
else
  # Append [ui] section
  content="${content}"$'\n\n[ui]'$'\n''orientation = "portrait"'
fi

# Replace pagedown/pageup with vim-style ctrl-d/ctrl-u
content=$(echo "$content" | sed 's/^pagedown[[:space:]]*=.*/ctrl-d = "scroll_preview_half_page_down"/')
content=$(echo "$content" | sed 's/^pageup[[:space:]]*=.*/ctrl-u = "scroll_preview_half_page_up"/')
# Remove old ctrl-u = "delete_line"
content=$(echo "$content" | sed '/^ctrl-u[[:space:]]*=.*"delete_line"/d')

echo "$content"
